version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: maint-server
    environment:
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES: ${JWT_EXPIRES:-24h}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      DB_PATH: /data/maintenance.db
    volumes:
      - db_data:/data
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: maint-client
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    driver: local
